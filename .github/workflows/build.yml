# Auto-versioning build workflow (shipped by the WorkspaceToolkit auto-versioning layer).
#
# On every push to `main` (i.e. a release merge), GitVersion computes the SemVer,
# then a separate step tags `main` with vX.Y.Z and cuts a GitHub Release.
# GitVersion only CALCULATES; this workflow does the tagging — see docs/auto-versioning.md.
#
# Optional by construction: a workspace without this layer simply has no workflow,
# and a human/AI tags manually (`git tag vX.Y.Z && git push origin vX.Y.Z`). Nothing
# else in the repo depends on this file existing.

name: build

on:
  push:
    branches: [main]

permissions:
  contents: write   # push the vX.Y.Z tag + create the GitHub Release

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # GitVersion requires the full commit graph + tags; a shallow clone
          # (the Actions default) silently miscomputes the version.
          # https://gitversion.net/docs/reference/requirements
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      # ── Optional build/pack step ───────────────────────────────────────────
      # Insert a language-appropriate build here if the workspace needs one
      # (e.g. for a dotnet workspace:
      #     - run: dotnet pack -c Release /p:Version=${{ steps.gitversion.outputs.majorMinorPatch }}
      # ). The versioning skeleton below is identical with or without it.

      - name: Tag release
        id: tag
        env:
          VERSION: ${{ steps.gitversion.outputs.majorMinorPatch }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — nothing to do (tags are immutable)."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create release
        # A tag pushed via GITHUB_TOKEN does NOT trigger a separate on:release
        # workflow, so the Release must be cut in this same run.
        # https://docs.github.com/en/actions/concepts/security/github_token
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.gitversion.outputs.majorMinorPatch }}
        run: gh release create "v$VERSION" --generate-notes --verify-tag
